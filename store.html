<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>متجر الرائد RSG</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
<style>
* { font-family: 'Cairo', sans-serif; }
:root {
  --orange: #F47B20;
  --orange-light: #F5A623;
  --dark: #1A1A1A;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #f1f5f9; }
::-webkit-scrollbar-thumb { background: #F47B20; border-radius: 3px; }

/* SIDEBAR */
#sidebar {
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  will-change: transform;
}
#sidebar-overlay {
  transition: opacity 0.35s ease;
}

/* CATEGORY ITEM */
.cat-item {
  transition: all 0.25s ease;
  cursor: pointer;
  border: 2px solid transparent;
}
.cat-item:hover {
  border-color: rgba(244,123,32,0.3);
  background: rgba(244,123,32,0.04);
}
.cat-item.active {
  border-color: #F47B20;
  background: rgba(244,123,32,0.08);
}
.cat-item.active .cat-name {
  color: #F47B20;
}
.cat-item .cat-img {
  transition: transform 0.3s ease;
}
.cat-item:hover .cat-img {
  transform: scale(1.05);
}

/* PRODUCT CARD */
.product-card {
  transition: all 0.3s ease;
}
.product-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 15px 40px rgba(244,123,32,0.12);
}
.product-card .prod-img img {
  transition: transform 0.4s ease;
}
.product-card:hover .prod-img img {
  transform: scale(1.06);
}

/* SKELETON */
.skeleton {
  background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* TOAST */
#toast {
  transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
  transform: translateY(80px);
  opacity: 0;
  pointer-events: none;
}
#toast.show {
  transform: translateY(0);
  opacity: 1;
}

/* CART DRAWER */
#cart-drawer {
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
}

/* SCROLL TOP */
#scroll-top {
  transition: all 0.3s ease;
  opacity: 0;
  pointer-events: none;
}
#scroll-top.visible {
  opacity: 1;
  pointer-events: all;
}

/* CART BADGE */
.cart-badge { animation: pop 0.3s ease; }
@keyframes pop {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.35); }
}

/* MODAL */
#product-modal { transition: opacity 0.3s ease; }

/* SIDEBAR TOGGLE BTN */
.sidebar-toggle-btn {
  transition: all 0.3s ease;
}

/* GRADIENT */
.grad { background: linear-gradient(135deg, #F47B20, #F5A623); }
.grad-text {
  background: linear-gradient(135deg, #F47B20, #F5A623);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Active indicator on sidebar */
.cat-item.active::before {
  content: '';
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 60%;
  background: #F47B20;
  border-radius: 3px 0 0 3px;
}
.cat-item { position: relative; }

@media (max-width: 768px) {
  #sidebar {
    position: fixed;
    top: 0; right: 0;
    height: 100vh;
    z-index: 50;
    transform: translateX(100%);
    width: 280px !important;
    box-shadow: -10px 0 40px rgba(0,0,0,0.15);
  }
  #sidebar.open {
    transform: translateX(0);
  }
  #main-content {
    width: 100% !important;
  }
}
</style>
</head>

<script>
  // =============================================
  // الإعدادات — لا تغير هذا القسم
  // =============================================
  const SUPABASE_URL = 'https://ydzphvflmnrqsiidhvmt.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_NCUsnmCoNad3aao1NKelJA__gkGnvIf';
  const WHATSAPP_NUMBER = '972598018781';
  // =============================================

  let cart = JSON.parse(localStorage.getItem('cart') || '[]');
  let currentProduct = null;
  let currentQty = 1;
  let currentCat = 'all';
  let allProducts = [];
  let sidebarOpen = false;
  let desktopSidebarVisible = true;

  // ====== SUPABASE ======
  async function supabase(table, query = '') {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    return res.json();
  }

  // ====== SIDEBAR TOGGLE (mobile) ======
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    sidebarOpen = !sidebarOpen;
    if (sidebarOpen) {
      sidebar.classList.add('open');
      overlay.classList.remove('hidden');
      setTimeout(() => overlay.classList.remove('opacity-0'), 10);
    } else {
      sidebar.classList.remove('open');
      overlay.classList.add('opacity-0');
      setTimeout(() => overlay.classList.add('hidden'), 350);
    }
  }

  // ====== SIDEBAR TOGGLE (desktop) ======
  function toggleDesktopSidebar() {
    const sidebar = document.getElementById('sidebar');
    const label = document.getElementById('desktop-toggle-label');
    desktopSidebarVisible = !desktopSidebarVisible;
    if (desktopSidebarVisible) {
      sidebar.classList.remove('hidden');
      sidebar.classList.add('block');
      label.textContent = 'إخفاء الأقسام';
    } else {
      sidebar.classList.add('hidden');
      label.textContent = 'إظهار الأقسام';
    }
  }

  // ====== LOAD CATEGORIES ======
  async function loadCategories() {
    const cats = await supabase('categories', '?order=name');
    const container = document.getElementById('sidebar-cats');
    container.innerHTML = '';
    cats?.forEach(cat => {
      const item = document.createElement('div');
      item.className = 'cat-item rounded-xl p-3 flex items-center gap-3';
      item.innerHTML = `
        <div class="w-12 h-12 rounded-xl overflow-hidden flex-shrink-0 bg-gray-100">
          ${cat.image_url
            ? `<img src="${cat.image_url}" alt="${cat.name}" class="cat-img w-full h-full object-cover" />`
            : `<div class="w-full h-full grad flex items-center justify-center text-white text-xl">📂</div>`
          }
        </div>
        <div class="min-w-0">
          <div class="cat-name font-black text-gray-800 text-sm truncate">${cat.name}</div>
        </div>`;
      item.onclick = () => filterProducts(cat.id, item);
      container.appendChild(item);
    });
  }

  // ====== SKELETON ======
  function showSkeleton() {
    const loading = document.getElementById('loading');
    loading.classList.remove('hidden');
    loading.innerHTML = Array(8).fill(`
      <div class="bg-white rounded-2xl overflow-hidden border border-gray-100">
        <div class="skeleton w-full h-44"></div>
        <div class="p-3 space-y-2">
          <div class="skeleton h-4 w-3/4 rounded-lg"></div>
          <div class="skeleton h-5 w-1/3 rounded-lg"></div>
        </div>
      </div>`).join('');
  }

  // ====== LOAD PRODUCTS ======
  async function loadProductsWithSearch(catId = 'all') {
    showSkeleton();
    document.getElementById('products-grid').innerHTML = '';
    document.getElementById('empty').classList.add('hidden');

    let query = '?select=*,categories(name)&available=eq.true&order=name';
    if (catId !== 'all') query += `&category_id=eq.${catId}`;

    allProducts = await supabase('products', query) || [];
    document.getElementById('loading').classList.add('hidden');

    // Update "all" count
    if (catId === 'all') {
      document.getElementById('all-count').textContent = `${allProducts.length} منتج`;
    }

    const searchVal = document.getElementById('search-input').value.trim();
    applySearch(searchVal);
  }

  function applySearch(val) {
    const filtered = val
      ? allProducts.filter(p =>
          p.name.toLowerCase().includes(val.toLowerCase()) ||
          (p.description || '').toLowerCase().includes(val.toLowerCase()))
      : allProducts;

    document.getElementById('results-label').textContent =
      `${filtered.length} منتج${currentCat !== 'all' ? ' في هذا القسم' : ''}`;

    if (!filtered.length) {
      document.getElementById('products-grid').innerHTML = '';
      document.getElementById('empty').classList.remove('hidden');
    } else {
      document.getElementById('empty').classList.add('hidden');
      renderProducts(filtered);
    }
  }

  function searchProducts(val) { applySearch(val); }

  function filterProducts(catId, btnEl) {
    currentCat = catId;
    document.getElementById('search-input').value = '';
    // Update active state
    document.querySelectorAll('.cat-item').forEach(b => b.classList.remove('active'));
    btnEl.classList.add('active');
    loadProductsWithSearch(catId);
    // Close sidebar on mobile
    if (sidebarOpen) toggleSidebar();
  }

  // ====== RENDER PRODUCTS ======
  function renderProducts(products) {
    const grid = document.getElementById('products-grid');
    grid.innerHTML = '';
    products.forEach(p => {
      const inCart = cart.some(i => i.id === p.id);
      const card = document.createElement('div');
      card.className = 'product-card bg-white rounded-2xl overflow-hidden border border-gray-100 cursor-pointer';
      card.style.boxShadow = '0 2px 10px rgba(0,0,0,0.04)';
      card.innerHTML = `
        <div class="prod-img relative overflow-hidden" style="height:180px;background:#f8fafc">
          <img src="${p.image_url || 'https://via.placeholder.com/300x200?text=📦'}"
            alt="${p.name}" class="w-full h-full object-cover" />
          <div class="absolute inset-0" style="background:linear-gradient(to top,rgba(0,0,0,0.15) 0%,transparent 50%)"></div>
          <span class="absolute top-2 right-2 text-xs font-bold px-2.5 py-1 rounded-full"
            style="background:rgba(255,255,255,0.92);color:#666">${p.categories?.name || ''}</span>
          ${inCart ? `<span class="absolute bottom-2 left-2 text-white text-xs font-black px-2.5 py-1 rounded-full grad">✓ في السلة</span>` : ''}
        </div>
        <div class="p-3">
          <h4 class="font-bold text-gray-800 text-sm mb-1 line-clamp-2 leading-snug">${p.name}</h4>
          <div class="flex items-center justify-between mt-2">
            <span class="font-black text-lg grad-text">${p.price} ₪</span>
            <button class="w-8 h-8 rounded-xl grad flex items-center justify-center text-white font-black text-lg shadow-sm hover:opacity-90 transition"
              style="box-shadow:0 2px 8px rgba(244,123,32,0.3)"
              onclick="event.stopPropagation();quickAdd(${JSON.stringify(p).replace(/"/g,'&quot;')})">+</button>
          </div>
        </div>`;
      card.onclick = () => openModal(p);
      grid.appendChild(card);
    });
  }

  // ====== QUICK ADD ======
  function quickAdd(p) {
    const existing = cart.find(i => i.id === p.id);
    if (existing) existing.qty += 1;
    else cart.push({ ...p, qty: 1 });
    saveCart();
    updateCartUI();
    showToast();
    applySearch(document.getElementById('search-input').value.trim());
  }

  // ====== MODAL ======
  function openModal(product) {
    currentProduct = product;
    currentQty = 1;
    document.getElementById('modal-img').src = product.image_url || 'https://via.placeholder.com/400x250?text=📦';
    document.getElementById('modal-name').textContent = product.name;
    document.getElementById('modal-desc').textContent = product.description || 'لا يوجد وصف';
    document.getElementById('modal-price').textContent = `${product.price} ₪`;
    document.getElementById('modal-qty').textContent = 1;
    const modal = document.getElementById('product-modal');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
  }

  function closeModal() {
    const modal = document.getElementById('product-modal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
  }

  function changeQty(delta) {
    currentQty = Math.max(1, currentQty + delta);
    document.getElementById('modal-qty').textContent = currentQty;
  }

  function addToCartFromModal() {
    const existing = cart.find(i => i.id === currentProduct.id);
    if (existing) existing.qty += currentQty;
    else cart.push({ ...currentProduct, qty: currentQty });
    saveCart();
    closeModal();
    updateCartUI();
    showToast();
    applySearch(document.getElementById('search-input').value.trim());
  }

  // ====== TOAST ======
  function showToast() {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ====== CART ======
  function toggleCart() {
    const drawer = document.getElementById('cart-drawer');
    const overlay = document.getElementById('overlay');
    const isOpen = !drawer.classList.contains('-translate-x-full');
    if (isOpen) {
      drawer.classList.add('-translate-x-full');
      overlay.classList.add('opacity-0');
      setTimeout(() => overlay.classList.add('hidden'), 300);
    } else {
      drawer.classList.remove('-translate-x-full');
      overlay.classList.remove('hidden');
      setTimeout(() => overlay.classList.remove('opacity-0'), 10);
      renderCart();
    }
  }

  function clearCart() {
    if (!cart.length) return;
    cart = []; saveCart(); renderCart();
  }

  function renderCart() {
    const container = document.getElementById('cart-items');
    const clearBtn = document.getElementById('clear-cart-btn');
    if (!cart.length) {
      clearBtn.classList.add('hidden');
      container.innerHTML = '<p id="cart-empty" class="text-center text-gray-400 mt-20 font-bold">السلة فارغة 🛒</p>';
      return;
    }
    clearBtn.classList.remove('hidden');
    container.innerHTML = cart.map((item, i) => `
      <div class="flex items-center gap-3 bg-gray-50 rounded-2xl p-3 border border-gray-100">
        <img src="${item.image_url || 'https://via.placeholder.com/60?text=📦'}"
          class="w-14 h-14 rounded-xl object-cover flex-shrink-0" />
        <div class="flex-1 min-w-0">
          <p class="font-bold text-gray-800 text-sm line-clamp-1">${item.name}</p>
          <p class="font-black text-sm grad-text">${item.price} ₪</p>
          <div class="flex items-center gap-2 mt-1">
            <button onclick="updateQty(${i},-1)"
              class="w-7 h-7 bg-white rounded-lg shadow text-gray-600 font-black text-sm border border-gray-200">−</button>
            <span class="font-black text-sm w-6 text-center">${item.qty}</span>
            <button onclick="updateQty(${i},1)"
              class="w-7 h-7 bg-white rounded-lg shadow text-gray-600 font-black text-sm border border-gray-200">+</button>
          </div>
        </div>
        <button onclick="removeItem(${i})" class="text-red-400 hover:text-red-600 text-2xl font-black flex-shrink-0">×</button>
      </div>`).join('');
    updateCartUI();
  }

  function updateQty(i, delta) {
    cart[i].qty = Math.max(1, cart[i].qty + delta);
    saveCart(); renderCart();
  }

  function removeItem(i) {
    cart.splice(i, 1); saveCart(); renderCart();
  }

  function updateCartUI() {
    const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
    const count = cart.reduce((s, i) => s + i.qty, 0);
    document.getElementById('cart-total').textContent = `${total} ₪`;
    const badge = document.getElementById('cart-count');
    if (count > 0) {
      badge.textContent = count;
      badge.style.display = 'flex';
      badge.classList.add('cart-badge');
    } else {
      badge.style.display = 'none';
    }
  }

  function saveCart() {
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartUI();
  }

  // ====== WHATSAPP ======
  function sendWhatsApp() {
    if (!cart.length) return alert('السلة فارغة!');
    const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
    let msg = '🛒 *طلب جديد - الرائد RSG*\n\n';
    cart.forEach(i => { msg += `• ${i.name} × ${i.qty} = ${i.price * i.qty} ₪\n`; });
    msg += `\n💰 *المجموع: ${total} ₪*\n\nأرجو التواصل لتأكيد الطلب 🙏`;
    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
    cart = []; saveCart(); renderCart();
  }

  // ====== SCROLL TOP ======
  window.addEventListener('scroll', () => {
    document.getElementById('scroll-top').classList.toggle('visible', window.scrollY > 300);
  });

  // ====== INIT ======
  loadCategories();
  loadProductsWithSearch();
  updateCartUI();
</script>
</body>
</html>
