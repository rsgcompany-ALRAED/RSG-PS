<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الموقع تحت الإنشاء</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Tajawal:wght@200;400;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --accent: #f0a500;
      --accent2: #e05c00;
      --text: #f0ede6;
      --muted: #6b6870;
      --glow: rgba(240, 165, 0, 0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(240,165,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(240,165,0,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(60px); }
    }

    /* Glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.25;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }
    .orb1 {
      width: 500px; height: 500px;
      background: var(--accent);
      top: -150px; right: -100px;
      animation-delay: 0s;
    }
    .orb2 {
      width: 350px; height: 350px;
      background: var(--accent2);
      bottom: -100px; left: -80px;
      animation-delay: 3s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      max-width: 700px;
      width: 100%;
    }

    /* Gear icon animation */
    .gears {
      font-size: 5rem;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      filter: drop-shadow(0 0 20px var(--accent));
    }
    .gear1 {
      display: inline-block;
      animation: spin 4s linear infinite;
    }
    .gear2 {
      display: inline-block;
      animation: spinReverse 3s linear infinite;
      margin-top: 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes spinReverse { to { transform: rotate(-360deg); } }

    /* Badge */
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000;
      font-family: 'Tajawal', sans-serif;
      font-weight: 800;
      font-size: 0.75rem;
      letter-spacing: 3px;
      padding: 0.4rem 1.2rem;
      border-radius: 100px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      animation: fadeSlideDown 0.8s ease forwards;
      opacity: 0;
    }

    h1 {
      font-family: 'Tajawal', sans-serif;
      font-weight: 800;
      font-size: clamp(2.5rem, 7vw, 5rem);
      line-height: 1.1;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeSlideDown 0.9s 0.2s ease forwards;
      opacity: 0;
    }

    p.sub {
      font-family: 'Cairo', sans-serif;
      font-weight: 300;
      font-size: 1.1rem;
      color: var(--muted);
      line-height: 1.8;
      max-width: 500px;
      margin: 0 auto 2.5rem;
      animation: fadeSlideDown 0.9s 0.4s ease forwards;
      opacity: 0;
    }

    /* Progress bar */
    .progress-wrap {
      background: var(--surface);
      border: 1px solid rgba(240,165,0,0.15);
      border-radius: 100px;
      height: 8px;
      margin: 0 auto 2rem;
      max-width: 400px;
      overflow: hidden;
      animation: fadeSlideDown 0.9s 0.6s ease forwards;
      opacity: 0;
    }
    .progress-bar {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      width: 0%;
      animation: loadBar 3s 1s ease forwards;
      box-shadow: 0 0 12px var(--glow);
    }
    @keyframes loadBar { to { width: 72%; } }

    .progress-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      animation: fadeSlideDown 0.9s 0.7s ease forwards;
      opacity: 0;
    }
    .progress-label span {
      color: var(--accent);
      font-weight: 700;
    }

    /* Notify form */
    .notify-form {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeSlideDown 0.9s 0.8s ease forwards;
      opacity: 0;
    }

    .notify-form input {
      background: var(--surface);
      border: 1px solid rgba(240,165,0,0.2);
      border-radius: 12px;
      padding: 0.8rem 1.2rem;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 0.95rem;
      min-width: 240px;
      outline: none;
      transition: border-color 0.3s;
    }
    .notify-form input::placeholder { color: var(--muted); }
    .notify-form input:focus { border-color: var(--accent); }

    .notify-form button {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      padding: 0.8rem 1.6rem;
      color: #000;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .notify-form button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(240,165,0,0.35);
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 3rem auto;
      animation: fadeSlideDown 0.9s 1s ease forwards;
      opacity: 0;
    }

    /* Social icons */
    .socials {
      display: flex;
      gap: 1rem;
      justify-content: center;
      animation: fadeSlideDown 0.9s 1.1s ease forwards;
      opacity: 0;
    }

    .social-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid rgba(240,165,0,0.1);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      font-size: 1.1rem;
      text-decoration: none;
      transition: all 0.3s;
    }
    .social-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(240,165,0,0.2);
    }

    /* Countdown */
    .countdown {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-bottom: 2rem;
      animation: fadeSlideDown 0.9s 0.65s ease forwards;
      opacity: 0;
    }
    .countdown-item {
      text-align: center;
    }
    .countdown-num {
      display: block;
      font-family: 'Tajawal', sans-serif;
      font-weight: 800;
      font-size: 2.2rem;
      color: var(--accent);
      line-height: 1;
      text-shadow: 0 0 20px rgba(240,165,0,0.5);
    }
    .countdown-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.2rem;
      letter-spacing: 1px;
    }
    .countdown-sep {
      font-size: 2rem;
      color: rgba(240,165,0,0.3);
      align-self: flex-start;
      margin-top: 0.2rem;
    }

    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Success message */
    .success-msg {
      display: none;
      color: var(--accent);
      font-size: 0.9rem;
      margin-top: 1rem;
    }
    .success-msg.show { display: block; animation: fadeSlideDown 0.4s ease forwards; }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="container">
    <div class="gears">
      <span class="gear1">⚙️</span>
      <span class="gear2">⚙️</span>
    </div>

    <div class="badge">قيد الإنشاء</div>

    <h1>الموقع قادم قريباً</h1>

    <p class="sub">
      نعمل بجدّ على بناء شيء رائع لكم.<br />
      نُشعركم بالإطلاق فور جهوزيّتنا.
    </p>

    <div class="countdown" id="countdown">
      <div class="countdown-item">
        <span class="countdown-num" id="days">00</span>
        <div class="countdown-label">يوم</div>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-item">
        <span class="countdown-num" id="hours">00</span>
        <div class="countdown-label">ساعة</div>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-item">
        <span class="countdown-num" id="minutes">00</span>
        <div class="countdown-label">دقيقة</div>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-item">
        <span class="countdown-num" id="seconds">00</span>
        <div class="countdown-label">ثانية</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>
    <p class="progress-label">نسبة الإنجاز: <span>72%</span></p>

    <div class="notify-form" id="notifyForm">
      <input type="email" id="emailInput" placeholder="بريدك الإلكتروني للتنبيه عند الإطلاق" />
      <button onclick="subscribe()">أخبرني</button>
    </div>
    <p class="success-msg" id="successMsg">✅ شكراً! سنُخبرك عند الإطلاق.</p>

    <div class="divider"></div>

    <div class="socials">
      <a href="#" class="social-btn" title="تويتر">𝕏</a>
      <a href="#" class="social-btn" title="انستقرام">📸</a>
      <a href="#" class="social-btn" title="واتساب">💬</a>
      <a href="#" class="social-btn" title="يوتيوب">▶</a>
    </div>
  </div>

  <script>
    // Countdown — target date (30 days from now)
    const target = new Date();
    target.setDate(target.getDate() + 30);

    function updateCountdown() {
      const now = new Date();
      const diff = target - now;
      if (diff <= 0) return;

      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);

      document.getElementById('days').textContent    = String(d).padStart(2,'0');
      document.getElementById('hours').textContent   = String(h).padStart(2,'0');
      document.getElementById('minutes').textContent = String(m).padStart(2,'0');
      document.getElementById('seconds').textContent = String(s).padStart(2,'0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    // Subscribe
    function subscribe() {
      const email = document.getElementById('emailInput').value.trim();
      if (!email || !email.includes('@')) {
        document.getElementById('emailInput').style.borderColor = '#e05c00';
        return;
      }
      document.getElementById('notifyForm').style.display = 'none';
      document.getElementById('successMsg').classList.add('show');
    }
  </script>
</body>
</html>
